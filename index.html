
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para sa Kanya</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec; /* Soft pink */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #d81b60;
        }
        p {
            color: #555;
            line-height: 1.6;
        }
        .heart {
            color: #e91e63;
            font-size: 50px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart">♥</div>
        <h1>Miss ko na siya.</h1>
        <p>
            "Yung tipong kahit busy ka, bigla mo na lang siyang maaalala. 
            Sana okay lang siya ngayon."
        </p>
        <hr>
        <p style="font-size: 0.8em;">Sent from my HTML Heart</p>
    </div>

</body>
</html>
